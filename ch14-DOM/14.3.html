<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="" id="source">Source</div>
    <section id="section">
      <div class="wrap">
        <h1 class="title">
          <span>タイトル</span>
        </h1>
        <ul class="list">
          <li>1</li>
          <li>2</li>
          <li>3</li>
        </ul>
      </div>
    </section>

    <script>
      setTimeout(() => {
        const sourceEl = document.querySelector("#source");
        const spanEl = document.querySelector("h1 span");
        spanEl.append(sourceEl);
      }, 2000);
    </script>
  </body>
</html>
