<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p id="textContent"></p>
    <p id="innerHTML"></p>
    <script>
      const str = "<strong>textContentとinnerHTML</strong>";

      const textC = document.querySelector("#textContent");

      const innerH = document.querySelector("#innerHTML");

      textC.textContent = str;

      innerH.innerHTML = str;
    </script>
  </body>
</html>
