<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- ここに新しい要素を追加したい -->
    <script>
      // <body>に挿入したいHTMLの構造を文字列で定義
      const htmlStr = `
        <article class="" id="">
          <h1 class="" id="article-title">
            記事のタイトル
          </h1>
          <div class="tag-area">
            <span>タグ:</span>
            <span>スポーツ</span>
            <span>バスケ</span>
          </div>
          <div class="article-body">記事の本文</div>
          <div class="" id="recommend">
            <h2>おすすめの記事</h2>
            <a href="#">他の記事</a>
          </div>
        </article>
      `;

      // HTML文字列をElementオブジェクトに変換する関数
      function htmlStrToElement(htmlStr) {
        const dummyDiv = document.createElement("div");
        dummyDiv.innerHTML = htmlStr;
        return dummyDiv.firstElementChild;
      }

      // HTML文字列からElementオブジェクトを取得
      const targetNewElement = htmlStrToElement(htmlStr);
      document.body.prepend(targetNewElement);
    </script>
  </body>
</html>
