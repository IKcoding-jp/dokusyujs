<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>このタグの色を変更しましょう</div>

    <style>
      .color-red {
        color: red;
      }
    </style>

    <script>
      const div = document.querySelector("div");
      div.style.backgroundColor = "gray";
      div.classList.add("color-red");
    </script>
  </body>
</html>
