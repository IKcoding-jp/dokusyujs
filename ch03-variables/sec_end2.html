<script>
    const TAX_RATE = 1.1;
    let productPrice = 1000;
    let taxIncludePrice = productPrice * TAX_RATE;

    //+を使った場合
    console.log("商品の金額は" + productPrice + "円ですので、税込み金額は" + taxIncludePrice + "円です。");

    //テンプレートリテラルを使った場合
    console.log(`商品の金額は${productPrice}円ですので、税込み金額は${taxIncludePrice}円です。`);
</script>
