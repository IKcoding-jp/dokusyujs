<script>
    //練習問題 3.6
    let obj = {
        prop : true,
        subObj : { val:100 },
        greeting: function (){
            console.log("こんにちは。");
        },
    };

    //ドット記法
    console.log( obj.prop );
    console.log( obj.subObj.val );
    obj.greeting();

    //ブラケット記法
    console.log( obj["prop"] );
    console.log( obj["subObj"]["val"] );
    obj["greeting"]();

    //プロパティval2とその値1000を追加する。
    obj.subObj.val2 = 1000;

    console.log( obj.subObj.val2 );
</script>
