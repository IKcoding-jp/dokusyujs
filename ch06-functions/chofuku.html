<script>
    //関数宣言で関数名が重複している場合
    function chofuku() {
        console.log( "こんにちは");
    }

    function chofuku() {
        console.log( "さようなら" );
    }

    chofuku();

    //関数式で関数名が重複している場合
    const chofuku = function() {
        console.log( "こんにちは");
    }

    const chofuku = function() { //エラーが発生する
        console.log( "さようなら");
    }
</script>
