<script>
    //文と文の区切りにはセミコロンをつける
    window.alert( "hello world" );
    window.alert( "goodbye world" );

    //しかし、javascriptの場合、文と文を改行して別の行に記述すれば、文末のセミコロンを省略できる
    //ただ、学習中の初心者であれば、バグの混入を防ぐことができるため、余計なトラブルにならない。
    window.alert( "hello world" )
    window.alert( "goodbye world" )//問題なく動作する
</script>
