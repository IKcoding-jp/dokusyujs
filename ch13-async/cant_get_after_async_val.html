<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let val = -1;

      function timer() {
        setTimeout(function () {
          // 0 - 10のランダムな値を取得
          val = Math.floor(Math.random() * 11);
        }, 1000);
      }

      timer();

      console.log(val);
    </script>
  </body>
</html>
