<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="number" id="val1" value="0" /> +
    <input type="number" id="val2" value="0" /> = <span id="answer">0</span>

    <script>
      const val1 = document.querySelector("#val1");
      const val2 = document.querySelector("#val2");
      const answer = document.querySelector("#answer");

      val1.addEventListener("input", (event) => {
        answer.textContent = Number(val1.value) + Number(val2.value);
      });

      val2.addEventListener("input", (event) => {
        answer.textContent = Number(val1.value) + Number(val2.value);
      });
    </script>

    <style>
      input {
        width: 50px;
      }
    </style>
  </body>
</html>
