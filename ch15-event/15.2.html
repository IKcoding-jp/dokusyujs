<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="container" data-mouseenter="purple" data-mouseleave="none">
      <div id="target" data-mouseenter="green" data-mouseleave="none"></div>
    </div>

    <script>
      const container = document.querySelector("#container");
      const target = document.querySelector("#target");

      // マウスが枠内に入ったとき、色を変える関数
      container.addEventListener("mouseenter", function (event) {
        container.style.background = container.dataset.mouseenter;
      });

      // #target に入ったとき、抜けたときの関数
      container.addEventListener("mouseleave", function (event) {
        container.style.background = "none";
      });

      target.addEventListener("mouseenter", function (event) {
        target.style.background = target.dataset.mouseenter;
      });

      target.addEventListener("mouseleave", function (event) {
        target.style.background = "none";
      });
    </script>

    <style>
      /* スタイルの調節 */

      #container,
      #target {
        position: absolute;
        border: 1px solid black;
        margin: 20px;
      }
      #target {
        width: 60px;
        height: 60px;
      }

      #container {
        width: 100px;
        height: 100px;
      }
      body {
        background: cornsilk;
      }
    </style>
  </body>
</html>
