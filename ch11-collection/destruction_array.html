<script>
  let arry = [1, 2, 3];

  let [x, y, z] = arry; //変数x,y,zを宣言し、それぞれに配列の要素を代入する
  console.log(x, y, z);

  let [x1, z1] = arry; //２つ目の要素を空白にする
  console.log(x1, z1);

  let x2;
  [x2] = arry;
  console.log(x2);

  let [, , , a3 = 4] = arry; //デフォルト値を設定できる
  console.log(a3);

  let [x4, ...rest] = arry;
  console.log( x4, rest );
</script>
